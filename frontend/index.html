<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HitchPool - Matchmaking Playground</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <!-- Top Bar -->
      <header class="top-bar">
        <div style="display:flex; align-items:center;">
            <h1 class="logo">Hitch<span>Pool</span></h1>
            <div id="persona-tabs" class="tabs-container" style="display:flex; align-items:center; gap:12px;">
              <!-- Persona Tabs will be injected here -->
              <button id="add-persona-btn" class="add-tab-btn">+ Add Persona</button>
              <button id="all-view-btn" class="tab-btn">All View</button>
            </div>
        </div>
        
        <!-- Global Search Toggle -->
        <div style="display:flex; align-items:center; position:relative;">
            <button id="global-search-toggle" class="btn-icon-glass" style="width:40px; height:40px; font-size:1.1rem; flex-shrink:0;" title="Search Map">🔍</button>
            
            <div id="global-map-search" class="glass-dropdown-overlay" style="position:absolute; top:50px; right:0; width:340px; display:none; flex-direction:column; padding:12px; transform-origin: top right; z-index:2000; transition: transform 0.2s ease, opacity 0.2s ease; opacity:0; transform:scale(0.95);">
                 <div class="input-glass-wrapper" style="border:none;">
                      <input type="text" id="map-search-input" class="text-input" placeholder="Search map location..." autocomplete="off" style="width:100%; border:none; background:transparent; padding:10px 14px; font-family:'Inter', sans-serif; font-size:16px; color:var(--text-primary); outline:none;" />
                 </div>
                 <div id="map-search-results" class="search-results" style="display:none; max-height:220px; overflow-y:auto; width:100%; margin-top:8px;"></div>
            </div>
        </div>
      </header>

      <!-- Main Layout -->
      <main class="layout">
        <!-- Left Panel: Contextual actions and Intent List -->
        <aside id="left-panel" class="panel glass-panel">
          <button id="toggle-left" class="panel-toggle" title="Collapse Panel">◀</button>
          <div class="panel-content-wrapper">
            <div id="left-panel-content">
               <!-- Dynamic Content -->
            </div>
          </div>
        </aside>

        <!-- Center: Interactive Map -->
        <section id="map-container">
          <div id="map"></div>
        </section>

        <!-- Right Panel: Matches -->
        <aside id="right-panel" class="panel glass-panel">
          <button id="toggle-right" class="panel-toggle" title="Collapse Panel">▶</button>
          <div class="panel-content-wrapper">
            <div id="right-panel-content">
              <!-- Matches will appear here -->
              <p class="empty-state">Select a persona or intent to view matches.</p>
            </div>
          </div>
        </aside>
      </main>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
